version: '3.8'

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:3.4
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=no
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
    depends_on:
      - zookeeper

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    container_name: ai_gateway_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # 默认密码设为 admin
    depends_on:
      - prometheus
    restart: always
  # 🌟 新增：AI 网关核心服务
  ai-api:
    build: .
    container_name: ai_api_server
    command: ["./api-server"] # 指定运行 api 二进制
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      - DB_DSN=root:123456@tcp(mysql:3306)/gateway?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka1:9092,kafka2:9093,kafka3:9094
    depends_on:
      - mysql
      - redis
      - kafka1

  # 🌟 网关 Worker 节点 (后台消费，不需要暴露端口)
  ai-worker:
    build: .
    container_name: ai_worker_server
    command: ["./worker-server"] # 指定运行 worker 二进制
    environment:
      - DB_DSN=root:123456@tcp(mysql:3306)/gateway?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka1:9092,kafka2:9093,kafka3:9094
    depends_on:
      - mysql
      - redis
      - kafka1