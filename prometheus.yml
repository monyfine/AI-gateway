# prometheus.yml
global:
  scrape_interval: 5s # 每 5 秒拉取一次数据，方便本地测试快速看到效果
  evaluation_interval: 5s

scrape_configs:
  # 🌟 1. 监控 AI API 网关
  - job_name: 'ai-gateway-api'
    metrics_path: '/metrics'
    static_configs:
      # 直接使用 docker-compose.yml 中定义的服务名 ai-api
      # 端口写你代码里 metrics 服务监听的端口 (通常是 9091)
      - targets: ['ai-api:9091']

  # 🌟 2. 监控后台 Worker 节点
  - job_name: 'ai-gateway-worker'
    metrics_path: '/metrics'
    static_configs:
      # 直接使用 docker-compose.yml 中定义的服务名 ai-worker
      - targets: ['ai-worker:9091']
      
  # (可选) 如果你也想顺便监控 Kafka/Redis 的底层状态，未来可以往这里加更多的 job